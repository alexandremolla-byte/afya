// ─── PUSH NOTIFICATIONS ───────────────────────────────────────────────────
function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64  = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw     = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function subscribeToPush(userId) {
  try {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) return false;
    const permission = await Notification.requestPermission();
    if (permission !== "granted") return false;

    const reg = await navigator.serviceWorker.ready;
    const existing = await reg.pushManager.getSubscription();
    const sub = existing || await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC),
    });

    await fetch("/.netlify/functions/save-subscription", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId, subscription: sub.toJSON() }),
    });
    return true;
  } catch(e) {
    console.error("Push subscribe error:", e);
    return false;
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────
function generatePromoCode(name) {
  const str = (name || "AFYA").toUpperCase().replace(/[^A-Z]/g, "").slice(0,4).padEnd(4,"X");
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i);
  return `${str}-${Math.abs(hash).toString(36).toUpperCase().slice(0,4).padEnd(4,"0")}`;
}

                boxSizing:"border-box", background: promoStatus==="valid" ? BRAND.color.light : "white",
                fontFamily:"inherit", transition:"border-color 0.2s" }}/>
            {promoStatus==="valid"    && <span style={{ position:"absolute", right:16, top:"50%", transform:"translateY(-50%)", fontSize:22 }}>✅</span>}
            {promoStatus==="invalid"  && <span style={{ position:"absolute", right:16, top:"50%", transform:"translateY(-50%)", fontSize:22 }}>❌</span>}
            {promoStatus==="checking" && <span style={{ position:"absolute", right:16, top:"50%", transform:"translateY(-50%)", fontSize:13, color:BRAND.color.muted }}>⏳</span>}
          </div>
          {promoStatus==="valid"    && <div className="fade-in" style={{ marginTop:12, background:BRAND.color.light, borderRadius:12, padding:"12px 16px", color:BRAND.color.primary, fontWeight:600, fontSize:13 }}>🎉 {referrerName} invited you! You'll both get 1 month Premium free.</div>}
          {promoStatus==="invalid"  && <div className="fade-in" style={{ marginTop:12, background:"#FFF0F0", borderRadius:12, padding:"12px 16px", color:BRAND.color.danger, fontSize:13 }}>Code not found — double-check it or skip this step.</div>}
          {promoStatus==="checking" && <div style={{ marginTop:12, background:BRAND.color.light, borderRadius:12, padding:"12px 16px", color:BRAND.color.muted, fontSize:13 }}>Checking your code…</div>}
          <p style={{ textAlign:"center", color:BRAND.color.muted, marginTop:16, fontSize:13 }}>No code? That's fine — tap <strong>Continue</strong> to skip.</p>
        </div>
      ),
    },
    ...(profile.condition==="maternal" ? [{
      key:"weeks",
      title:"How many weeks pregnant?", subtitle:"We'll track your milestones week by week",
      canNext: true,
      body: (
        <div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", marginBottom:20 }}>
            <input ref={inputRef} placeholder="0" type="number" value={profile.weeks}
              onChange={e => setProfile(p => ({...p, weeks:e.target.value}))}
              style={{ width:160, padding:"20px 16px", border:`2px solid ${BRAND.color.light}`, borderRadius:14, fontSize:40, fontWeight:900, outline:"none", textAlign:"center", boxSizing:"border-box", fontFamily:"inherit", color:BRAND.color.primary }}/>
          </div>
          <p style={{ textAlign:"center", color:BRAND.color.muted, fontSize:15, marginBottom:20, fontWeight:600 }}>weeks pregnant</p>
          {profile.weeks && (
            <div className="fade-in" style={{ background:BRAND.color.light, borderRadius:14, padding:"16px 20px", fontSize:14, color:BRAND.color.text, lineHeight:1.7 }}>
              {parseInt(profile.weeks)<=12  && "🤰 First trimester — focus on folic acid and booking your first ANC visit."}
              {parseInt(profile.weeks)>12 && parseInt(profile.weeks)<=27 && "🌸 Second trimester — energy is returning! Time for anatomy scan and iron supplements."}
              {parseInt(profile.weeks)>27   && "👶 Third trimester — baby is growing fast. Prepare your birth plan and hospital bag."}
            </div>
          )}
        </div>
      ),
    }] : []),
  ];

  const current  = steps[step];
  const isPromo  = current.key === "promo";
  const isLast   = step === steps.length - 1;
  const canNext  = current.canNext;
  const progress = ((step + 1) / steps.length) * 100;

  const goNext = async () => {
    if (!isLast) {
      setDirection("forward");
      setAnimKey(k => k + 1);
      setStep(s => s + 1);
      return;
    }
    setSaving(true);
    const appliedPromo = promoStatus === "valid" ? promoInput.trim().toUpperCase() : null;
    await onComplete({ ...profile, appliedPromo });
    setSaving(false);
  };

  const goBack = () => {
    setDirection("backward");
    setAnimKey(k => k + 1);
    setStep(s => s - 1);
  };

  const stepLabels = { welcome:"Let's go →", name:"Continue →", condition:"Build my plan →", promo:"Apply & Continue 🎁", weeks:"Continue →" };
  const ctaLabel = saving ? "Setting up your profile…"
    : isLast ? (profile.condition === "maternal" ? "Start tracking my pregnancy 🤰" : profile.condition === "diabetes" ? "Start managing my diabetes 💉" : profile.condition === "hypertension" ? "Start managing my BP ❤️" : "Start my health journey 🌿")
    : isPromo && promoStatus === "checking" ? "Checking code…"
    : stepLabels[current.key] || "Continue →";

  return (
    <div style={{ minHeight:"100vh", background:"white", display:"flex", flexDirection:"column" }}>

      {/* ── Header: back button + progress ── */}
      <div style={{ padding:"52px 24px 0", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:10 }}>
          {step > 0 ? (
            <button onClick={goBack} style={{ width:36, height:36, borderRadius:18, border:`2px solid ${BRAND.color.light}`, background:"white", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:18, flexShrink:0, color:BRAND.color.text }}>
              ←
            </button>
          ) : <div style={{ width:36 }}/>}
          <div style={{ flex:1 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ fontSize:12, color:BRAND.color.muted, fontWeight:600 }}>{({welcome:"Welcome",name:"Your name",condition:"Your condition",promo:"Referral code",weeks:"Pregnancy"})[current.key] || ("Step " + (step+1))}</span>
              <span style={{ fontSize:12, color:BRAND.color.primary, fontWeight:700 }}>{Math.round(progress)}%</span>
            </div>
            <div style={{ height:6, background:BRAND.color.light, borderRadius:3, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${progress}%`, background:BRAND.color.primary, borderRadius:3, transition:"width 0.45s cubic-bezier(0.4,0,0.2,1)" }}/>
            </div>
          </div>
        </div>
      </div>

      {/* ── Animated step content ── */}
      <div key={animKey} className={direction === "forward" ? "slide-in-right" : "slide-in-left"}
        style={{ flex:1, padding:"28px 24px 0", overflowY:"auto" }}>
        <h1 style={{ fontSize:26, fontWeight:900, color:BRAND.color.text, marginBottom:6, lineHeight:1.2 }}>{current.title}</h1>
        <p style={{ color:BRAND.color.muted, marginBottom:28, fontSize:14, lineHeight:1.6 }}>{current.subtitle}</p>
        {current.body}
      </div>

      {/* ── Bottom CTAs ── */}
      <div style={{ padding:"20px 24px 36px", flexShrink:0, display:"flex", flexDirection:"column", gap:10 }}>
        <button onClick={goNext} disabled={!canNext || saving || (isPromo && promoStatus === "checking")} style={{
          width:"100%", padding:"17px", borderRadius:14, border:"none",
          background: (canNext && !saving) ? BRAND.color.primary : BRAND.color.light,
          color: (canNext && !saving) ? "white" : BRAND.color.muted,
          fontSize:16, fontWeight:700, cursor:(canNext && !saving) ? "pointer" : "default",
          fontFamily:"inherit", transition:"background 0.2s",
        }}>
          {ctaLabel}
        </button>
        {isPromo && (
          <button onClick={goNext} style={{ width:"100%", padding:"14px", borderRadius:14, border:`2px solid ${BRAND.color.light}`, background:"white", color:BRAND.color.muted, fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>
            Skip — I don't have a code
          </button>
        )}
      </div>
    </div>
  );
}

// ─── VITAL LOG CARD ───────────────────────────────────────────────────────
function VitalLogCard({ profile, vitals, onLog }) {
  const condition = profile?.condition;
  const [val, setVal]     = useState("");
  const [val2, setVal2]   = useState("");
  const [ctx, setCtx]     = useState("fasting");
  const [saving, setSaving] = useState(false);
  const [saved, setSaved]   = useState(false);

  const cfgMap = {
    diabetes:    { type:"blood_sugar", label:"Blood Sugar",     unit:"mg/dL", emoji:"🩸", ph:"e.g. 127",  showCtx:true,  ctxOpts:["fasting","after_meal","bedtime"], target:"Target: 80–130 fasting · <180 after meals" },
    hypertension:{ type:"bp",          label:"Blood Pressure",  unit:"mmHg",  emoji:"🫀", ph:"Systolic",  ph2:"Diastolic", showCtx:false, target:"Target: <130/80 mmHg" },
    maternal:    { type:"weight",      label:"Weight",          unit:"kg",    emoji:"⚖️", ph:"e.g. 68",   showCtx:false, target:"Log your weight weekly" },
    wellness:    { type:"weight",      label:"Weight",          unit:"kg",    emoji:"⚖️", ph:"e.g. 75",   showCtx:false, target:"Track your weight for general wellness" },
  };
  const cfg = cfgMap[condition];
  if (!cfg) return null;

  const lastReading = vitals?.find(v => v.type === cfg.type);
  const lastText = lastReading
    ? cfg.type === "bp"
      ? `Last: ${lastReading.value}/${lastReading.value2} mmHg`
      : `Last: ${lastReading.value} ${cfg.unit}`
    : "No readings yet";

  const handleLog = async () => {
    if (!val.trim()) return;
    setSaving(true);
    await onLog(cfg.type, parseFloat(val), cfg.type==="bp" ? parseFloat(val2)||null : null, cfg.showCtx ? ctx : null, cfg.unit);
    setVal(""); setVal2("");
    setSaving(false); setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  return (
    <div style={{ background:"white", borderRadius:16, padding:"16px 18px", marginBottom:16, boxShadow:"0 1px 8px rgba(0,0,0,0.06)" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:22 }}>{cfg.emoji}</span>
          <div>
            <p style={{ fontWeight:700, fontSize:14 }}>{cfg.label}</p>
            <p style={{ fontSize:11, color:BRAND.color.muted }}>{lastText}</p>
          </div>
        </div>
        {saved && <span style={{ fontSize:12, color:BRAND.color.primary, fontWeight:700 }}>✓ Saved!</span>}
      </div>
      <p style={{ fontSize:11, color:BRAND.color.muted, marginBottom:10 }}>{cfg.target}</p>
      <div style={{ display:"flex", gap:8 }}>
        <input type="number" value={val} onChange={e => setVal(e.target.value)}
          placeholder={cfg.ph}
          style={{ flex:1, padding:"10px 12px", border:`2px solid ${BRAND.color.light}`, borderRadius:10, fontSize:14, outline:"none", fontFamily:"inherit" }}/>
        {cfg.type==="bp" && (
          <input type="number" value={val2} onChange={e => setVal2(e.target.value)}
            placeholder={cfg.ph2||""}
            style={{ flex:1, padding:"10px 12px", border:`2px solid ${BRAND.color.light}`, borderRadius:10, fontSize:14, outline:"none", fontFamily:"inherit" }}/>
        )}
        {cfg.showCtx && (
          <select value={ctx} onChange={e => setCtx(e.target.value)}
            style={{ padding:"10px 8px", border:`2px solid ${BRAND.color.light}`, borderRadius:10, fontSize:11, outline:"none", fontFamily:"inherit", background:"white" }}>
            {cfg.ctxOpts.map(o => <option key={o} value={o}>{o.replace("_"," ")}</option>)}
          </select>
        )}
        <button onClick={handleLog} disabled={saving || !val.trim()}
          style={{ padding:"10px 16px", borderRadius:10, border:"none", background: val.trim() ? BRAND.color.primary : BRAND.color.light, color:"white", fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit", flexShrink:0 }}>
          {saving ? "…" : "Log"}
        </button>
      </div>
    </div>
  );
}

// ─── AI CHAT ──────────────────────────────────────────────────────────────
function Chat({ profile, isPremium, onShowUpgrade, vitals, meds }) {
  const [messages, setMessages] = useState(CHAT_INIT);
  const [input, setInput]       = useState("");
  const [typing, setTyping]     = useState(false);
  const [msgCount, setMsgCount] = useState(0);
  const endRef = useRef(null);
  const FREE_LIMIT = 3;

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, typing]);

  const send = async () => {
    if (!input.trim() || typing) return;
    if (!isPremium && msgCount >= FREE_LIMIT) return;
    const userMsg = input.trim();
    setInput("");
    const updatedMessages = [...messages, { role:"user", text:userMsg }];
    setMessages(updatedMessages);
    setMsgCount(c => c+1);
    trackEvent("chat_message_sent", { is_premium: isPremium });
    setTyping(true);
    try {
      const res = await fetch("/.netlify/functions/chat", {
        method:"POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ messages:updatedMessages, profile, vitals:(vitals||[]).slice(0,10), meds:meds||[] }),
      });
      const data = await res.json();
      setTyping(false);
      setMessages(m => [...m, { role:"ai", text: data.error ? "I'm having a moment — please try again. 💚" : data.reply }]);
    } catch {
      setTyping(false);
      setMessages(m => [...m, { role:"ai", text:"I'm having trouble connecting. Please check your connection and try again. 💚" }]);
    }
  };

  const freeMsgsLeft = isPremium ? Infinity : Math.max(0, FREE_LIMIT - msgCount);
  const hitLimit = !isPremium && msgCount >= FREE_LIMIT;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:"#F9FCFB" }}>
      <div style={{ background:BRAND.color.primary, padding:"16px 20px", color:"white" }}>

// ─── MEDICATIONS ──────────────────────────────────────────────────────────
function Medications({ meds, medLogs, onToggleMed, onAddMed, profile, isPremium, onShowUpgrade, referralCode }) {
  const [showAdd, setShowAdd]           = useState(false);
  const [newMed, setNewMed]             = useState({ name:"", time:"08:00" });
  const [saving, setSaving]             = useState(false);
  const [showShareModal, setShowShare]  = useState(false);

  const today      = new Date().toISOString().slice(0, 10);
  const adherence  = Math.round((meds.filter(m => m.taken).length / Math.max(meds.length, 1)) * 100);

  // Build last-7-days adherence chart from medLogs
  const last7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(Date.now() - (6 - i) * 24 * 60 * 60 * 1000);
    const dateStr = d.toISOString().slice(0, 10);
    const dayLogs = medLogs.filter(l => l.logged_date === dateStr);
    const takenCount = dayLogs.filter(l => l.taken).length;
    return { label: ["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()], filled: takenCount > 0, isToday: dateStr === today };
  });

  // Streak: consecutive days ending today where at least 1 med was taken
  const streak = (() => {
    let s = 0;
    for (let i = 0; i < 30; i++) {
      const d = new Date(Date.now() - i * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
      const taken = medLogs.some(l => l.logged_date === d && l.taken);
      if (taken) s++;
      else break;
    }
    return s;
  })();

  // Auto-show share card on milestone streaks (once per milestone)
  useEffect(() => {
    const MILESTONES = [3, 7, 14, 21, 30];
    if (!MILESTONES.includes(streak)) return;
    const key = `afya_streak_shared_${streak}`;
    if (localStorage.getItem(key)) return;
    // Small delay so the user sees their completed streak first
    const t = setTimeout(() => {
      localStorage.setItem(key, "1");
      setShowShare(true);
    }, 1200);
    return () => clearTimeout(t);
  }, [streak]);

  const handleAdd = async () => {
    if (!newMed.name.trim() || saving) return;
    setSaving(true);
    await onAddMed(newMed.name, newMed.time);
    setNewMed({ name:"", time:"08:00" });
    setShowAdd(false);
    setSaving(false);
  };

  return (
    <div style={{ padding:"24px 20px", background:"#F9FCFB", minHeight:"100%" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
        <h2 style={{ fontSize:22, fontWeight:800 }}>Medications</h2>
        <button onClick={() => setShowAdd(s => !s)} style={{ padding:"8px 16px", borderRadius:20, border:"none", background:BRAND.color.primary, color:"white", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
          + Add
        </button>
      </div>
      <p style={{ fontSize:14, color:BRAND.color.muted, marginBottom:20 }}>Tap to mark as taken</p>

      {showAdd && (
        <div className="fade-in" style={{ background:"white", borderRadius:16, padding:20, marginBottom:16, boxShadow:"0 2px 12px rgba(0,0,0,0.08)" }}>
          <p style={{ fontWeight:700, marginBottom:12 }}>Add medication</p>
          <input placeholder="Medication name & dose" value={newMed.name}
            onChange={e => setNewMed(p => ({...p, name:e.target.value}))}
            onKeyDown={e => e.key==="Enter" && handleAdd()}
            style={{ width:"100%", padding:"12px 14px", border:`2px solid ${BRAND.color.light}`, borderRadius:10, fontSize:14, outline:"none", marginBottom:10, boxSizing:"border-box", fontFamily:"inherit" }}/>
          <div style={{ display:"flex", gap:10 }}>
            <input type="time" value={newMed.time}
              onChange={e => setNewMed(p => ({...p, time:e.target.value}))}
              style={{ flex:1, padding:"12px 14px", border:`2px solid ${BRAND.color.light}`, borderRadius:10, fontSize:14, outline:"none", fontFamily:"inherit" }}/>
            <button onClick={handleAdd} disabled={saving} style={{ flex:1, padding:"12px", borderRadius:10, border:"none", background:BRAND.color.primary, color:"white", fontWeight:700, fontSize:14, cursor:"pointer", fontFamily:"inherit", opacity:saving?0.7:1 }}>
              {saving ? "Saving…" : "Save"}
            </button>
          </div>
        </div>
      )}

      {/* Streak + 7-day adherence */}
      <div style={{ background:"white", borderRadius:16, padding:20, marginBottom:20, boxShadow:"0 1px 8px rgba(0,0,0,0.06)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <div>
            <p style={{ fontWeight:700, fontSize:15 }}>7-Day Adherence</p>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <p style={{ fontSize:13, color:BRAND.color.muted }}>
                {streak > 0 ? `🔥 ${streak}-day streak` : "Start your streak today"}
              </p>
              {streak >= 3 && (
                <button onClick={() => setShowShare(true)}
                  style={{ fontSize:11, fontWeight:700, padding:"3px 9px", borderRadius:20, border:`1.5px solid ${BRAND.color.primary}`, background:"white", color:BRAND.color.primary, cursor:"pointer", fontFamily:"inherit" }}>
                  Share
                </button>
              )}
            </div>
          </div>
          <p style={{ fontSize:32, fontWeight:900, color: adherence>=80 ? BRAND.color.primary : BRAND.color.accent }}>{adherence}%</p>
        </div>
        <div style={{ display:"flex", gap:6 }}>
          {last7.map((d, i) => (
            <div key={i} style={{ flex:1, textAlign:"center" }}>
              <div style={{ height:40, borderRadius:6, background: d.filled ? BRAND.color.primary : BRAND.color.light, marginBottom:4, border: d.isToday ? `2px solid ${BRAND.color.primary}` : "none", opacity: d.filled ? 1 : 0.5 }}/>
              <p style={{ fontSize:10, color: d.isToday ? BRAND.color.primary : BRAND.color.muted, fontWeight: d.isToday ? 700 : 400 }}>{d.label}</p>
            </div>
          ))}
        </div>
      </div>

      {meds.length === 0 && (
        <div style={{ textAlign:"center", padding:"32px 20px", color:BRAND.color.muted, fontSize:14 }}>
          <p style={{ fontSize:32, marginBottom:8 }}>💊</p>
          <p>No medications yet. Tap + Add to get started.</p>
        </div>
      )}

      {meds.map(med => (
        <div key={med.id} style={{ display:"flex", alignItems:"center", gap:14, background:"white", borderRadius:14, padding:"16px", marginBottom:10, boxShadow:"0 1px 8px rgba(0,0,0,0.06)" }}>
          <button onClick={() => onToggleMed(med.id)} style={{ width:32, height:32, borderRadius:16, border:`2px solid ${med.taken?BRAND.color.primary:"#DDD"}`, background:med.taken?BRAND.color.primary:"white", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            {med.taken && <span style={{ color:"white", fontSize:16 }}>✓</span>}
          </button>
          <div style={{ flex:1 }}>
            <p style={{ fontWeight:600, fontSize:15, textDecoration:med.taken?"line-through":"none", color:med.taken?BRAND.color.muted:BRAND.color.text }}>{med.name}</p>
            <p style={{ fontSize:12, color:BRAND.color.muted, marginTop:2 }}>🕐 {med.time}</p>
          </div>
          <span style={{ fontSize:11, fontWeight:600, padding:"4px 10px", borderRadius:20, background:med.taken?BRAND.color.light:"#FFF3E0", color:med.taken?BRAND.color.primary:BRAND.color.accent }}>
            {med.taken ? "DONE" : "PENDING"}
          </span>
        </div>
      ))}

      {showShareModal && (
        <ShareStreakModal
          streak={streak}
          profile={profile}
          referralCode={referralCode || "AFYA"}
          onClose={() => setShowShare(false)}
        />
      )}
    </div>
  );
}

// ─── SHARE REPORT MODAL ───────────────────────────────────────────────────
function ShareReportModal({ profile, userId, onClose }) {
  const [link, setLink]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [copied, setCopied]   = useState(false);

  useEffect(() => {
    const ensureToken = async () => {
      let token = profile?.report_token;

      // If no token yet, generate one and persist it
      if (!token) {
        token = crypto.randomUUID();
        await sb.from("profiles").update({ report_token: token }).eq("id", userId);
      }

      setLink(`https://getafya.co/report.html?t=${token}`);
      setLoading(false);
    };
    ensureToken();
  }, []);

  const handleCopy = async () => {
    if (!link) return;
    try {
      await navigator.clipboard.writeText(link);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    } catch { /* fallback: select text */ }
    trackEvent("report_shared", { method: "copy" });
  };

  const handleWhatsApp = () => {
    const firstName = (profile?.name || "").split(" ")[0] || "I";
    const condition = { diabetes:"my diabetes management", hypertension:"my blood pressure management", maternal:"my pregnancy health", wellness:"my daily health" }[profile?.condition] || "my health";
    const text = `Hi Doctor,\n\nPlease find my latest AFYA medication report card here:\n${link}\n\nThis shows my current streak, medication adherence over the last 30 days, and upcoming doses.\n\nThank you,\n${firstName}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
    trackEvent("report_shared", { method: "whatsapp" });
  };

  const handleEmail = () => {
    const firstName = (profile?.name || "").split(" ")[0] || "I";
    const subject   = encodeURIComponent(`AFYA Medication Report — ${profile?.name || ""}`);
    const body      = encodeURIComponent(`Dear Doctor,\n\nPlease find my latest medication report card generated by AFYA:\n${link}\n\nThis report shows my medication adherence over the last 30 days, current streak, and upcoming doses.\n\nBest regards,\n${firstName}`);
    window.open(`mailto:?subject=${subject}&body=${body}`, "_blank");
    trackEvent("report_shared", { method: "email" });

  const overlay = { position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:1000 };
  const sheet   = { background:"white", borderRadius:"24px 24px 0 0", padding:"28px 24px 40px", width:"100%", maxWidth:480, animation:"slideUp 0.25s ease" };

  return (
    <div style={overlay} onClick={onClose}>
      <div style={sheet} onClick={e => e.stopPropagation()}>
        <div style={{ width:40, height:4, background:"#E0E0E0", borderRadius:4, margin:"0 auto 20px" }}/>
        <p style={{ fontSize:20, fontWeight:800, marginBottom:4 }}>📋 Share with your Doctor</p>
        <p style={{ fontSize:14, color:BRAND.color.muted, marginBottom:20 }}>
          Send your medication report card via email or WhatsApp. Your doctor can view your adherence, streak, and upcoming doses.
        </p>

        {loading ? (
          <div style={{ textAlign:"center", padding:"24px", color:BRAND.color.muted }}>Generating link…</div>
        ) : (
          <>
            {/* Link preview box */}
            <div style={{ background:BRAND.color.light, borderRadius:12, padding:"12px 14px", marginBottom:16, display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:12, color:BRAND.color.muted, flex:1, wordBreak:"break-all", fontFamily:"monospace" }}>{link}</span>
              <button onClick={handleCopy} style={{ flexShrink:0, background:BRAND.color.primary, color:"white", border:"none", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                {copied ? "✓ Copied!" : "Copy"}
              </button>
            </div>

            {/* Share buttons */}
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <button onClick={handleEmail} style={{ width:"100%", padding:"14px", borderRadius:14, border:`2px solid ${BRAND.color.primary}`, background:BRAND.color.light, color:BRAND.color.primary, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>

              Anyone with this link can view the report. You can share it at any time.

        trackEvent("streak_shared", { streak, method: "native" });
      } catch(_) {}
    } else {
      // fallback: copy
      navigator.clipboard?.writeText(shareText).catch(() => {});
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
      trackEvent("streak_shared", { streak, method: "copy" });
    }
  };

  const handleWhatsApp = () => {
    window.open(waLink, "_blank");
    setShared(true);
    trackEvent("streak_shared", { streak, method: "whatsapp" });
  };

  // milestone label
  const milestoneLabel = streak >= 30 ? "30-Day Champion 🏆"
    : streak >= 21 ? "3-Week Warrior 💪"
    : streak >= 14 ? "2-Week Strong 🌟"
    : streak >= 7  ? "One Week Strong 🔥"
    : `${streak}-Day Streak 🔥`;

  const conditionEmoji = { diabetes:"🩸", hypertension:"❤️", pregnancy:"🤰", wellness:"✨" }[profile?.condition] || "💊";

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(13,43,38,0.75)", zIndex:1000, display:"flex", alignItems:"flex-end", justifyContent:"center", padding:"0 0 0 0" }} onClick={onClose}>
      <div className="slide-up" onClick={e => e.stopPropagation()}
        style={{ background:"white", borderRadius:"28px 28px 0 0", width:"100%", maxWidth:480, overflow:"hidden" }}>

        {/* ── Card preview ── */}
        <div style={{
          background: "linear-gradient(145deg, #0D7E6A 0%, #064E41 50%, #0A2E28 100%)",
          padding: "40px 28px 32px",
          position: "relative",
          overflow: "hidden",
        }}>
          {/* background decoration */}
          <div style={{ position:"absolute", top:-40, right:-40, width:180, height:180, borderRadius:"50%", background:"rgba(255,255,255,0.05)" }}/>
          <div style={{ position:"absolute", bottom:-20, left:-20, width:120, height:120, borderRadius:"50%", background:"rgba(255,255,255,0.04)" }}/>

          {/* AFYA wordmark */}
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:28 }}>
            <div style={{ width:28, height:28, borderRadius:8, background:"rgba(255,255,255,0.15)", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
              </svg>
            </div>
            <span style={{ color:"rgba(255,255,255,0.8)", fontSize:14, fontWeight:700, letterSpacing:2 }}>AFYA</span>
          </div>

          {/* Streak number */}
          <div style={{ marginBottom:16 }}>
            <p style={{ fontSize:72, fontWeight:900, color:"white", lineHeight:1, marginBottom:4 }}>
              🔥 {streak}
            </p>
            <p style={{ fontSize:15, color:"rgba(255,255,255,0.7)", fontWeight:600, letterSpacing:0.5 }}>
              consecutive days
            </p>
          </div>

          {/* Milestone badge */}
          <div style={{ display:"inline-flex", alignItems:"center", gap:6, background:"rgba(245,166,35,0.25)", border:"1px solid rgba(245,166,35,0.4)", borderRadius:50, padding:"6px 14px", marginBottom:20 }}>
            <span style={{ fontSize:13, fontWeight:700, color:"#F5A623" }}>{milestoneLabel}</span>
          </div>

          {/* Name + condition */}
          <p style={{ color:"rgba(255,255,255,0.9)", fontSize:15, lineHeight:1.5 }}>
            {conditionEmoji} <strong style={{ color:"white" }}>{profile?.name || "A friend"}</strong> is {conditionLabel} daily.
          </p>

          {/* Referral pill */}
          <div style={{ marginTop:20, background:"rgba(255,255,255,0.1)", borderRadius:12, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ color:"rgba(255,255,255,0.65)", fontSize:12 }}>Join free with code</span>
            <span style={{ color:"white", fontWeight:900, fontSize:16, letterSpacing:2 }}>{referralCode}</span>
          </div>
        </div>

        {/* ── Actions ── */}
        <div style={{ padding:"24px 20px 32px" }}>
          <p style={{ fontSize:13, color:"#6B8C88", textAlign:"center", marginBottom:18 }}>
            Share your streak — your friend gets 1 month free, so do you.
          </p>

          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            <button onClick={handleWhatsApp}
              style={{ width:"100%", padding:"15px", borderRadius:14, border:"none", background:"#25D366", color:"white", fontWeight:700, fontSize:15, cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
              💬 Share on WhatsApp
            </button>

            <button onClick={handleNativeShare}
              style={{ width:"100%", padding:"15px", borderRadius:14, border:"none", background: copied ? "#27AE8A" : BRAND.color.primary, color:"white", fontWeight:700, fontSize:15, cursor:"pointer", fontFamily:"inherit" }}>
              {copied ? "✓ Copied to clipboard!" : (navigator.share ? "📤 Share…" : "📋 Copy message")}
            </button>

            {shared && (
              <p className="fade-in" style={{ textAlign:"center", fontSize:13, color:BRAND.color.primary, fontWeight:600 }}>
                🎉 Nice! Your referral code is on its way.
              </p>
            )}

            <button onClick={onClose}
              style={{ width:"100%", padding:"13px", borderRadius:14, border:`1.5px solid #E8F0EE`, background:"transparent", color:"#6B8C88", fontWeight:600, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>
              Maybe later
            </button>
          </div>
        </div>

      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────
function AfyaApp() {
  const [session, setSession]               = useState(null);
  const [sessionLoading, setSessionLoading] = useState(true);
  const [profile, setProfile]               = useState(null);
  const [profileLoading, setProfileLoading] = useState(false);
  const [onboarded, setOnboarded]           = useState(false);
  const [tab, setTab]                       = useState("home");
  const [meds, setMeds]                     = useState([]);
  const [medLogs, setMedLogs]               = useState([]); // last 7 days
  const [referralState, setReferralState]   = useState({ myCode:"", friendsReferred:0, freeMonthsEarned:0 });
  const [showUpgrade, setShowUpgrade]         = useState(false);
  const [upgradeLoading, setUpgradeLoading]   = useState(false);
  const [vitals, setVitals]                   = useState([]);
  const [insight, setInsight]                 = useState(null);
  const [insightLoading, setInsightLoading]   = useState(false);

  const isPremium = !!(profile?.is_premium);

  const loadProfile = useCallback(async (userId) => {
    setProfileLoading(true);
    const { data, error } = await sb.from("profiles").select("*").eq("id", userId).single();
    if (error) console.error("loadProfile error:", error.message, error.code);
    if (data) {
      setProfile(data);
      setReferralState({
        myCode:           data.referral_code || generatePromoCode(data.name),
        friendsReferred:  data.friends_referred   || 0,
        freeMonthsEarned: data.free_months_earned || 0,
      });
      setOnboarded(true);
    }
    setProfileLoading(false);
  }, []);

  const loadVitals = useCallback(async (userId) => {
    const { data } = await sb.from("health_logs")
      .select("*").eq("user_id", userId)
      .order("logged_at", { ascending: false }).limit(30);
    if (data) setVitals(data);
  }, []);

  const loadMeds = useCallback(async (userId) => {
    const today = new Date().toISOString().slice(0, 10);
    const sevenDaysAgo = new Date(Date.now() - 6 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);

    // Load active medications
    const { data: medsData } = await sb.from("medications")
      .select("*").eq("user_id", userId).eq("active", true)
      .order("created_at", { ascending: true });

    // Load today's logs + last 7 days for adherence chart
    const { data: logsData } = await sb.from("med_logs")
      .select("*").eq("user_id", userId)
      .gte("logged_date", sevenDaysAgo)
      .order("logged_date", { ascending: false });

    const logs = logsData || [];
    const todayLogs = logs.filter(l => l.logged_date === today);

    // Merge today's taken status into meds
    const medsWithStatus = (medsData || []).map(m => ({
      ...m,
      taken: todayLogs.some(l => l.medication_id === m.id && l.taken),
    }));

    setMeds(medsWithStatus);
    setMedLogs(logs);
  }, []);

  const toggleMed = async (medId) => {
    if (!session) return;
    const today = new Date().toISOString().slice(0, 10);
    const med = meds.find(m => m.id === medId);
    if (!med) return;
    const newTaken = !med.taken;

    // Optimistic update
    setMeds(prev => prev.map(m => m.id === medId ? { ...m, taken: newTaken } : m));

    // Upsert log for today (unique constraint: medication_id + logged_date)
    await sb.from("med_logs").upsert({
      user_id: session.user.id,
      medication_id: medId,
      taken: newTaken,
      logged_date: today,
      logged_at: new Date().toISOString(),
    }, { onConflict: "medication_id,logged_date" });

    // Refresh logs for adherence chart
    await loadMeds(session.user.id);
  };

  const addMed = async (name, time) => {
    if (!session || !name.trim()) return;
    const { data } = await sb.from("medications").insert({
      user_id: session.user.id, name: name.trim(), time, active: true,
    }).select().single();
    if (data) setMeds(prev => [...prev, { ...data, taken: false }]);
  };

  const seedDefaultMeds = async (userId, condition) => {
    const defaults = DEFAULT_MEDS_BY_CONDITION[condition] || [];
    if (!defaults.length) return;
    await sb.from("medications").insert(
      defaults.map(m => ({ user_id: userId, name: m.name, time: m.time, condition, active: true }))
    );
  };

  const logVital = async (type, value, value2, context, unit) => {
    if (!session) return;
    await sb.from("health_logs").insert({
      user_id: session.user.id, type, value,
      value2: value2 || null, context: context || null, unit,
      logged_at: new Date().toISOString(),
    });
    trackEvent("vital_logged", { type, context }, session.user.id);
    await loadVitals(session.user.id);
  };

  const refreshInsight = useCallback(async () => {
    if (!isPremium || !profile) return;
    setInsightLoading(true);
    try {
      const res = await fetch("/.netlify/functions/insights", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ profile, vitals: vitals.slice(0,20), meds }),
      });
      const data = await res.json();
      if (data.insight) setInsight(data.insight);
    } catch(e) { console.error("Insight error:", e); }
    setInsightLoading(false);
  }, [isPremium, profile, vitals, meds]);

  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      if (session) { loadProfile(session.user.id); loadVitals(session.user.id); loadMeds(session.user.id); }
      else setSessionLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      if (session) { loadProfile(session.user.id); loadVitals(session.user.id); loadMeds(session.user.id); trackEvent("app_open", {}, session.user.id); setSessionLoading(false); }
      else { setProfile(null); setOnboarded(false); setMeds([]); setMedLogs([]); setVitals([]); setInsight(null); setSessionLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, [loadProfile]);

  useEffect(() => {
    if (!profileLoading && session) setSessionLoading(false);
  }, [profileLoading, session]);

  const handleOnboardComplete = async (p) => {
    const myCode = generatePromoCode(p.name);
    const { error: upsertError } = await sb.from("profiles").upsert({
      id: session.user.id, name:p.name, age:p.age, condition:p.condition,
      weeks:p.weeks||null, applied_promo:p.appliedPromo||null,
      referral_code:myCode, friends_referred:0, free_months_earned:0,
    });
    if (upsertError) {
      console.error("Profile upsert failed:", upsertError);
      // Force onboarded even if upsert fails so user isn't stuck looping
      setProfile({ name:p.name, age:p.age, condition:p.condition, weeks:p.weeks, referral_code:myCode, friends_referred:0, free_months_earned:0 });
      setReferralState({ myCode, friendsReferred:0, freeMonthsEarned:0 });
      setOnboarded(true);
      return;
    }
    // Apply referral code if the user entered a valid one — grants 30 days Premium to both sides
    if (p.appliedPromo) {
      try {
        await fetch("/.netlify/functions/apply-referral", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ code:p.appliedPromo, newUserId:session.user.id, validate:false }),
        });
      } catch(e) { console.error("Referral apply error:", e); }
    }
    // Seed default medications for the user's condition
    await seedDefaultMeds(session.user.id, p.condition);
    // Track onboarding completion
    trackEvent("onboarding_complete", { condition: p.condition, had_referral: !!p.appliedPromo }, session.user.id);
    // Reload fresh profile + meds from Supabase
    await loadProfile(session.user.id);
    await loadMeds(session.user.id);
    // Ask for notification permission after a short delay (less jarring post-onboarding)
    setTimeout(() => subscribeToPush(session.user.id), 3000);
  };

  // ── Paystack upgrade ──────────────────────────────────────────────────
  const openPaystack = (plan) => {
    setUpgradeLoading(true);
    trackEvent("payment_initiated", { plan }, session.user.id);
    const amount = plan==="annual" ? 2500000 : 250000; // kobo
    try {
      const handler = window.PaystackPop.setup({
        key:      PAYSTACK_KEY,
        email:    session.user.email,
        amount:   amount,
        currency: "NGN",
        ref:      `AFYA-${Date.now()}-${Math.random().toString(36).slice(2,8).toUpperCase()}`,
        metadata: { user_id:session.user.id, plan },
        callback: async (response) => {
          setShowUpgrade(false);
          try {
            const res = await fetch("/.netlify/functions/verify-payment", {
              method:"POST",
              headers:{ "Content-Type":"application/json" },
              body: JSON.stringify({ reference:response.reference, userId:session.user.id, plan }),
            });
            const data = await res.json();
            if (data.success) {
              trackEvent("payment_complete", { plan, reference: response.reference }, session.user.id);
              await loadProfile(session.user.id);
            }
          } catch(e) {
            console.error("Payment verify error:", e);
          }
          setUpgradeLoading(false);
        },
        onClose: () => { setUpgradeLoading(false); },
      });
      handler.openIframe();
    } catch(e) {
      console.error("Paystack setup error:", e);
      setUpgradeLoading(false);
    }
  };

  const handleShowUpgrade = (plan) => {
    if (plan) { openPaystack(plan); }
    else { setShowUpgrade(true); }
  };

  const simulateReferral  = () => setReferralState(prev => ({...prev, friendsReferred:prev.friendsReferred+1, freeMonthsEarned:prev.freeMonthsEarned+1}));

  // ── Render gates ──
  if (sessionLoading) return <LoadingScreen message="Starting AFYA…"/>;
  if (!session)       return <AuthScreen/>;
  if (profileLoading) return <LoadingScreen message="Loading your profile…"/>;
  if (!onboarded)     return <Onboarding onComplete={handleOnboardComplete}/>;

  const tabs = [
    { key:"home",    label:"Home",    emoji:"🏠" },
    { key:"chat",    label:"AFYA AI", emoji:"🤖" },
    { key:"meds",    label:"Meds",    emoji:"💊" },
    { key:"refer",   label:"Refer",   emoji:"🎁" },
    { key:"profile", label:"Profile", emoji:"👤" },
  ];

  return (
    <div style={{ maxWidth:430, margin:"0 auto", height:"100vh", display:"flex", flexDirection:"column", fontFamily:"'DM Sans', -apple-system, sans-serif", background:"white" }}>
      {showUpgrade && (
        <UpgradeModal
          onUpgrade={(plan) => { openPaystack(plan); setShowUpgrade(false); }}
          onClose={() => setShowUpgrade(false)}
          loading={upgradeLoading}
        />
      )}

      <div style={{ background:BRAND.color.primary, padding:"8px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.18)"/>
            <path d="M3 16 L10 16 L11.5 12 L13 21 L14.5 4 L16 25 L17.5 16 L29 16" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <span style={{ color:"white", fontWeight:900, fontSize:18, letterSpacing:2 }}>AFYA</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          {isPremium && <span style={{ background:BRAND.color.accent, borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700, color:"white" }}>⭐ PREMIUM</span>}
          {!isPremium && referralState.freeMonthsEarned>0 && <span style={{ background:BRAND.color.accent, borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700, color:"white" }}>🎁 {referralState.freeMonthsEarned}mo free</span>}
          <span style={{ color:"rgba(255,255,255,0.8)", fontSize:12 }}>🇳🇬</span>
        </div>
      </div>

      <div style={{ flex:1, overflow:"auto" }}>
        {tab==="home"    && <Dashboard profile={profile} meds={meds} onToggleMed={toggleMed} referralState={referralState} onGoToRefer={() => setTab("refer")} isPremium={isPremium} onShowUpgrade={handleShowUpgrade} vitals={vitals} logVital={logVital} insight={insight} insightLoading={insightLoading} onRefreshInsight={refreshInsight}/>}
        {tab==="chat"    && <Chat profile={profile} isPremium={isPremium} onShowUpgrade={handleShowUpgrade} vitals={vitals} meds={meds}/>}
        {tab==="meds"    && <Medications meds={meds} medLogs={medLogs} onToggleMed={toggleMed} onAddMed={addMed} profile={profile} isPremium={isPremium} onShowUpgrade={handleShowUpgrade} referralCode={referralState.myCode}/>}
        {tab==="refer"   && <ReferFriends profile={profile} referralState={referralState} onSimulateReferral={simulateReferral}/>}
        {tab==="profile" && <Profile profile={profile} referralState={referralState} isPremium={isPremium} onShowUpgrade={handleShowUpgrade} userId={session.user.id}/>}
      </div>

      <div style={{ background:"white", borderTop:"1px solid #EEF2F0", padding:"8px 0 16px", display:"flex" }}>
        {tabs.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2, border:"none", background:"none", cursor:"pointer", padding:"6px 0", position:"relative", fontFamily:"inherit" }}>
            <span style={{ fontSize:18 }}>{t.emoji}</span>
            <span style={{ fontSize:10, fontWeight: tab===t.key?700:400, color: tab===t.key?BRAND.color.primary:BRAND.color.muted }}>{t.label}</span>
            {tab===t.key && <div style={{ width:4, height:4, borderRadius:2, background:BRAND.color.primary }}/>}
            {t.key==="refer" && referralState.friendsReferred>0 && (
              <div style={{ position:"absolute", top:2, right:"20%", width:16, height:16, borderRadius:8, background:BRAND.color.accent, color:"white", fontSize:9, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>
                {referralState.friendsReferred}
              </div>
            )}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AfyaApp/>);
</script>

<!-- ── Service Worker registration ── -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    });
  }

  // ── Install prompt banner ──────────────────────────────────────────────
  let deferredPrompt = null;

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById("pwa-banner");
    if (banner) banner.style.display = "flex";
  });

  window.addEventListener("appinstalled", () => {
    const banner = document.getElementById("pwa-banner");
    if (banner) banner.style.display = "none";
    deferredPrompt = null;
  });

  function installPWA() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      const banner = document.getElementById("pwa-banner");
      if (banner) banner.style.display = "none";
    });
  }

  function dismissPWA() {
    const banner = document.getElementById("pwa-banner");
    if (banner) banner.style.display = "none";
    // Don't show again for 7 days
    localStorage.setItem("pwa-dismissed", Date.now());
  }

  // Don't show if dismissed recently
  window.addEventListener("DOMContentLoaded", () => {
    const dismissed = parseInt(localStorage.getItem("pwa-dismissed") || "0");
    if (Date.now() - dismissed < 7 * 24 * 60 * 60 * 1000) {
      const banner = document.getElementById("pwa-banner");
      if (banner) banner.style.display = "none";
    }
  });
</script>

<!-- ── Install banner UI ── -->
<div id="pwa-banner" style="
  display:none; position:fixed; bottom:80px; left:12px; right:12px; z-index:9999;
  background:white; border-radius:16px; padding:14px 16px;
  box-shadow:0 4px 24px rgba(0,0,0,0.15);
  align-items:center; gap:12px;
  font-family:'DM Sans',-apple-system,sans-serif;
">
  <div style="width:40px;height:40px;border-radius:10px;background:#0D7E6A;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="22" height="22" viewBox="0 0 80 80" fill="none">
      <path d="M8 40 L22 40 L26 30 L30 52 L34 18 L38 58 L42 40 L72 40" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div style="flex:1;min-width:0;">
    <div style="font-weight:700;font-size:14px;color:#0D2B26;">Add AFYA to your phone</div>
    <div style="font-size:12px;color:#6B8C88;margin-top:1px;">Install for quick access, works offline</div>
  </div>
  <button onclick="installPWA()" style="
    background:#0D7E6A;color:white;border:none;border-radius:10px;
    padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;
  ">Install</button>
  <button onclick="dismissPWA()" style="
    background:none;border:none;color:#6B8C88;font-size:20px;cursor:pointer;
    padding:4px;flex-shrink:0;line-height:1;
  ">×</button>
</div>
